<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>md_AdminJail</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="adminMenu" class="app hidden">
        <div class="app-backdrop"></div>

        <main class="dashboard">
            <header class="dashboard-header">
                <div class="brand">
                    <div class="brand-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none">
                            <circle cx="7" cy="12" r="4" stroke="currentColor" stroke-width="1.8"/>
                            <circle cx="17" cy="12" r="4" stroke="currentColor" stroke-width="1.8"/>
                            <path d="M11 12h2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <div>
                        <h1>md_AdminJail</h1>
                        <p>Strafenverwaltung</p>
                    </div>
                </div>
                <button id="closeBtn" type="button" class="icon-btn close-btn" title="Schließen">
                    <svg viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                </button>
            </header>

            <div class="toolbar">
                <nav class="tabs" aria-label="Listen">
                    <button type="button" class="tab active" data-tab="players">
                        <svg viewBox="0 0 24 24" fill="none"><circle cx="9" cy="8" r="3" stroke="currentColor" stroke-width="1.6"/><circle cx="17" cy="9" r="2.5" stroke="currentColor" stroke-width="1.6"/><path d="M4 19c0-3 2.5-5 5-5s5 2 5 5M14 19c0-2.2 1.6-4 3.5-4.3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
                        Spieler
                    </button>
                    <button type="button" class="tab" data-tab="jailed">
                        <svg viewBox="0 0 24 24" fill="none"><rect x="5" y="10" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M8 10V7a4 4 0 0 1 8 0v3" stroke="currentColor" stroke-width="1.6"/></svg>
                        Inhaftiert
                    </button>
                </nav>
                <label class="search">
                    <svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="6" stroke="currentColor" stroke-width="1.8"/><path d="M16 16l5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
                    <input id="adminSearch" type="text" placeholder="Suchen..." autocomplete="off">
                </label>
            </div>

            <div class="list-meta">
                <span id="activeListLabel">Spielerliste</span>
                <span id="jailCount" class="count-pill">0</span>
            </div>

            <section id="playerList" class="player-list" aria-live="polite"></section>
        </main>

        <section id="jailPopup" class="modal hidden" aria-modal="true" role="dialog">
            <div class="modal-card">
                <header class="modal-header">
                    <div>
                        <span class="modal-eyebrow" id="modalEyebrow">Neue Strafe</span>
                        <h2 id="modalTitle">Spieler bestrafen</h2>
                    </div>
                    <button type="button" class="icon-btn modal-close" id="popupCancelBtn" title="Abbrechen">
                        <svg viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                    </button>
                </header>

                <div class="selected-player">
                    <div class="player-chip">
                        <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.6"/><path d="M5 20c0-4 3.5-6 7-6s7 2 7 6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
                    </div>
                    <div>
                        <strong id="popupPlayerName">Spieler</strong>
                        <small>ID <b id="popupPlayerId">0</b></small>
                    </div>
                </div>

                <div class="field">
                    <label for="popupReason">
                        <svg class="field-icon" viewBox="0 0 24 24" fill="none"><rect x="6" y="4" width="12" height="16" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M9 8h6M9 12h6M9 16h4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
                        Grund
                    </label>
                    <div class="field-row">
                        <input id="popupReason" type="text" placeholder="Grund der Strafe..." autocomplete="off">
                        <button id="popupReasonCheck" type="button" class="check-btn danger">×</button>
                    </div>
                </div>

                <div class="field">
                    <label for="popupAmount">
                        <svg id="amountIcon" class="field-icon clock-icon-svg" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="1.6"/><path d="M12 8v4l3 2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
                        <span id="popupAmountLabel">Zeit (Minuten)</span>
                    </label>
                    <div class="field-row">
                        <input id="popupAmount" type="number" min="1" placeholder="Wert eingeben..." autocomplete="off">
                        <button id="popupAmountCheck" type="button" class="check-btn danger">×</button>
                    </div>
                </div>

                <div class="type-section">
                    <span class="type-label">Strafentyp</span>
                    <div id="typeGrid" class="type-grid">
                        <button type="button" class="type-card active" data-type="standard">
                            <svg viewBox="0 0 24 24" fill="none"><rect x="4" y="10" width="16" height="10" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M8 10V7a4 4 0 0 1 8 0v3" stroke="currentColor" stroke-width="1.6"/></svg>
                            <span>Standard</span>
                            <small>Zeitstrafe</small>
                        </button>
                        <button type="button" class="type-card" data-type="community">
                            <svg viewBox="0 0 24 24" fill="none"><path d="M9 20l-2-8M15 20l2-8M7 12h10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M12 4v4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
                            <span>Community</span>
                            <small>Aufgaben</small>
                        </button>
                        <button type="button" class="type-card wide" data-type="facility">
                            <svg viewBox="0 0 24 24" fill="none"><path d="M8 10h8v10H8z" stroke="currentColor" stroke-width="1.6"/><path d="M10 6h4v4h-4zM6 20h12" stroke="currentColor" stroke-width="1.6"/></svg>
                            <span>Facility</span>
                            <small>Reinigung + Minigame</small>
                        </button>
                    </div>
                </div>

                <footer class="modal-actions dialog-actions">
                    <button id="popupReleaseBtn" type="button" class="btn btn-warn hidden">Freilassen</button>
                    <button id="popupStartBtn" type="button" class="btn btn-primary">Strafe starten</button>
                </footer>
            </div>
        </section>
    </div>

    <div id="jailHud" class="hidden">
        <div class="hud">
            <div class="hud-top">
                <svg class="hud-cuffs" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <circle cx="7" cy="12" r="4" stroke="currentColor" stroke-width="1.8"/>
                    <circle cx="17" cy="12" r="4" stroke="currentColor" stroke-width="1.8"/>
                    <path d="M11 12h2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
                <h1 id="jailTitle">ADMINJAIL</h1>
                <p id="jailTypeText" class="hud-type">Standard Jail</p>
            </div>
            <div class="hud-grid">
                <div class="hud-item">
                    <span>Admin</span>
                    <strong id="jailAdminName">-</strong>
                </div>
                <div class="hud-item">
                    <span id="jailValueLabel">Restzeit</span>
                    <strong id="jailValueText">00:00</strong>
                </div>
            </div>
            <div class="hud-reason">
                <span>Grund</span>
                <p id="jailReasonText">-</p>
            </div>
            <svg id="jailValueIcon" class="hud-hidden-icon" viewBox="0 0 24 24" aria-hidden="true"></svg>
        </div>
    </div>

    <div id="minigame" class="minigame-overlay hidden">
        <div class="minigame-card">
            <header>
                <h2>Facility Management</h2>
                <p>Reinige alle markierten Flächen bevor die Zeit abläuft.</p>
            </header>
            <div class="minigame-stats">
                <div><span>Zeit</span><strong id="minigameTimer">12s</strong></div>
                <div><span>Fortschritt</span><strong id="minigameProgress">0/5</strong></div>
            </div>
            <div id="minigameGrid" class="minigame-grid"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
