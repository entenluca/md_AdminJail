<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdminJail Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app" class="hidden">
        <div class="panel">
            <header class="panel-header">
                <div>
                    <h1>AdminJail</h1>
                    <p>Verwaltung eingesperrter Spieler</p>
                </div>
                <div class="header-actions">
                    <button id="refreshBtn" class="btn btn-secondary">Aktualisieren</button>
                    <button id="closeBtn" class="btn btn-danger">Schließen</button>
                </div>
            </header>

            <section class="stats">
                <div class="stat-card">
                    <span class="stat-label">Eingesperrt</span>
                    <span id="jailCount" class="stat-value">0</span>
                </div>
            </section>

            <section class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Restzeit</th>
                            <th>Grund</th>
                            <th>Admin</th>
                            <th>Aktion</th>
                        </tr>
                    </thead>
                    <tbody id="playerTableBody">
                        <tr class="empty-row">
                            <td colspan="6">Keine Spieler im AdminJail</td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </div>
    </div>

    <div id="jailHud" class="hidden">
        <div class="jail-card">
            <div class="jail-card-glow"></div>
            <div class="jail-card-content">
                <div class="jail-header">
                    <div class="jail-icon">
                        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M7 11V8a5 5 0 0 1 10 0v3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                            <rect x="5" y="11" width="14" height="10" rx="2.5" stroke="currentColor" stroke-width="1.8"/>
                            <circle cx="12" cy="16" r="1.5" fill="currentColor"/>
                        </svg>
                    </div>
                    <div>
                        <span class="jail-badge">Admin Jail</span>
                        <p class="jail-subtitle">Du bist vorübergehend eingesperrt</p>
                    </div>
                </div>

                <div class="jail-admin-block">
                    <span class="jail-label">Eingesperrt von</span>
                    <h2 id="jailAdminName">Admin</h2>
                </div>

                <div class="jail-time-block">
                    <span id="jailTimeValue" class="jail-time-value">00:00</span>
                    <span class="jail-time-label">Restzeit</span>
                </div>

                <div class="jail-reason-block">
                    <span class="jail-label">Grund</span>
                    <p id="jailReasonText">-</p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
